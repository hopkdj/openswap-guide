<footer class="site-footer">
  <div class="container">
    <ul class="footer-links">
      <li><a href="{{ .Site.BaseURL }}">Home</a></li>
      <li><a href="{{ "index.xml" | relURL }}">RSS</a></li>
      <li><a href="https://github.com/{{ .Site.Params.github }}" target="_blank" rel="noopener">GitHub</a></li>
      {{ with .Site.Params.twitter }}
      <li><a href="https://twitter.com/{{ . }}" target="_blank" rel="noopener">Twitter</a></li>
      {{ end }}
    </ul>
    <p>&copy; {{ now.Format "2006" }} {{ .Site.Title }}. All rights reserved.</p>
    <p style="margin-top: 4px; font-size: 0.75rem;">Built with Hugo · Dark Theme</p>
  </div>
</footer>
