
{{ if .Site.Params.a_ads_id }}
<!-- AADS Ad Container Styles -->
<style>
  #frame {
    margin: 2rem auto;
    position: relative;
    z-index: 99998;
  }
  #frame iframe {
    border: 0;
    padding: 0;
    width: 70%;
    height: auto;
    overflow: hidden;
    display: block;
    margin: auto;
  }
  .ad-label {
    font-size: 0.7rem;
    color: var(--text-tertiary, #71717a);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    text-align: center;
    margin-bottom: 0.5rem;
  }
  @media (max-width: 640px) {
    #frame iframe {
      width: 100%;
    }
  }
</style>
{{ end }}

{{/* GoatCounter Analytics */}}
<script data-goatcounter="https://stevejj.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
