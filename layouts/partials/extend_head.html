
{{ if .Site.Params.a_ads_id }}
<!-- A-Ads (Anonymous Ads) - No KYC Required -->
<script type="text/javascript">
  let e = document.createElement("div");
  let s = document.createElement("script");
  s.src = "https://anonymousads.com/adunits/{{ .Site.Params.a_ads_id }}/script.js";
  e.className = "aads";
  s.onload = function() { document.querySelectorAll('.aads').forEach(a => a.appendChild(e)) };
  document.body.appendChild(s);
</script>
<style>
  .aads {
    margin: 20px auto;
    text-align: center;
    min-height: 100px;
    background: var(--entry);
    border: 1px solid var(--border);
    padding: 10px;
  }
</style>
{{ end }}
