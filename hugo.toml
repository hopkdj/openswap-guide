baseURL = "https://hopkdj.github.io/openswap-guide/"
title = "OpenSwap Guide | Open Source Alternatives & Self-Hosted Solutions"
theme = "PaperMod"

defaultContentLanguage = "en"
languageCode = "en"
enableRobotsTXT = true
buildDrafts = false
buildFuture = true
buildExpired = false

[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML"]

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  description = "Comprehensive guides for open source alternatives, self-hosted software, and local AI deployment."
  author = "OpenSwap Team"
  
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = true
  
  a_ads_id = "your-a-ads-id-here"

  [params.assets]
    disableHLJS = true
    disableFingerprinting = false

  [params.label]
    text = "OpenSwap"
    icon = "/apple-touch-icon.png"
    iconHeight = 35

  [params.homeInfoParams]
    Title = "🚀 OpenSwap Guide"
    Content = "Your comprehensive guide to open source alternatives and self-hosted solutions. Replace commercial software with privacy-focused, self-hosted tools.\n\n📖 **New articles every 30 minutes** — comparisons, tutorials, and deployment guides.\n\n🔒 No cloud lock-in. No tracking. No subscriptions. Just open source."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com"
  
  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "summary", "date", "content", "tags"]

[[menu.main]]
  identifier = "comparisons"
  name = "Comparisons"
  url = "/tags/comparison/"
  weight = 10

[[menu.main]]
  identifier = "guides"
  name = "Deployment Guides"
  url = "/tags/guide/"
  weight = 20

[[menu.main]]
  identifier = "tools"
  name = "Tools"
  url = "/tags/tools/"
  weight = 30

[[menu.main]]
  identifier = "ai"
  name = "Local AI"
  url = "/tags/ai/"
  weight = 40

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true
        title = true
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNoStart = 1
    lineNos = true
    lineNumbersInTable = true
    tabWidth = 4
