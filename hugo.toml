baseURL = "https://hopkdj.github.io/openswap-guide/"
title = "OpenSwap Guide"
theme = "hermes-dark"
languageCode = "en-us"
enableRobotsTXT = true
summaryLength = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  description = "Comprehensive guides for open source alternatives, self-hosted software, privacy tools, and local AI deployment. Expert comparisons, setup guides, and benchmarks."
  github = "hopkdj"
  a_ads_id = "2433958"
  author = "OpenSwap Guide Team"
  author_role = "Editorial Team"
  twitter = ""
  default_image = "img/og-default.png"

  # SEO / GEO
  [params.seo]
    organization = "OpenSwap Guide"
    organization_url = "https://hopkdj.github.io/openswap-guide/"
    locale = "en_US"

[[menu.main]]
  name = "Home"
  url = "/"
  weight = 1

[[menu.main]]
  name = "Comparisons"
  url = "/tags/comparison/"
  weight = 2

[[menu.main]]
  name = "Guides"
  url = "/tags/guide/"
  weight = 3

[[menu.main]]
  name = "Local AI"
  url = "/tags/ai/"
  weight = 4

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = true
    lineNumbersInTable = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[taxonomies]
  tag = "tags"
  category = "categories"
