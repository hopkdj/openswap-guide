baseURL = "https://hopkdj.github.io/openswap-guide/"
title = "OpenSwap Guide"
theme = "hermes-dark"
languageCode = "en-us"
enableRobotsTXT = true
summaryLength = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  description = "Comprehensive guides for open source alternatives, self-hosted software, and local AI deployment."
  github = "hopkdj"

[[menu.main]]
  name = "Home"
  url = "/"
  weight = 1

[[menu.main]]
  name = "Comparisons"
  url = "/tags/comparison/"
  weight = 2

[[menu.main]]
  name = "Guides"
  url = "/tags/guide/"
  weight = 3

[[menu.main]]
  name = "Local AI"
  url = "/tags/ai/"
  weight = 4

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = true
    lineNumbersInTable = true
